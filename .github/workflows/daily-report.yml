name: Daily CDC Stock Report

on:
  schedule:
    # ทุกวันจันทร์-ศุกร์ เวลา 09:00 น. (เวลาไทย UTC+7 = 02:00 UTC)
    - cron: "0 2 * * 1-5"
  workflow_dispatch: # รันด้วยมือได้ผ่าน GitHub UI

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CDC report & send Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node run.js
